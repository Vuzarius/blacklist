<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный чёрный список Vusarius'а</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090c;--bg2:#0d1117;--bg3:#131920;
  --b1:#1e2a38;--b2:#263545;--b3:#304055;
  --text:#e8eef5;--t2:#8fa3b8;--t3:#4a6070;
  --ice:#a8d4f0;--red:#d06060;--red2:#e88888;
}
*{margin:0;padding:0;box-sizing:border-box}

/* ══════════════════════════════
   DESKTOP: side-by-side
══════════════════════════════ */
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}

.layout{display:flex;height:100vh;width:100vw}

/* ── LEFT panel ── */
.panel-left{
  width:44%;flex-shrink:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid var(--b1);
  background:var(--bg);
}
.left-header{
  flex-shrink:0;
  background:rgba(7,9,12,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b1);
  padding:0 28px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.left-logo{
  font-family:'Unbounded',sans-serif;font-size:10px;
  font-weight:400;letter-spacing:.2em;color:var(--t2);
  text-transform:uppercase;display:flex;align-items:center;gap:8px;
}
.logo-line{width:18px;height:1px;background:linear-gradient(90deg,var(--ice),transparent)}
.hcount{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--ice);padding:3px 10px;
  background:rgba(168,212,240,.07);
  border:1px solid rgba(168,212,240,.18);border-radius:20px;
}
.search-wrap{flex-shrink:0;padding:16px 20px 0}
.s-inp{
  width:100%;background:var(--bg2);border:1px solid var(--b1);
  border-radius:8px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;
  padding:10px 14px;outline:none;transition:.2s;
}
.s-inp::placeholder{color:var(--t3)}
.s-inp:focus{border-color:rgba(168,212,240,.35);background:var(--bg3);box-shadow:0 0 0 3px rgba(168,212,240,.05)}
.list-meta{
  flex-shrink:0;padding:10px 20px 6px;
  font-size:11px;color:var(--t3);letter-spacing:.04em;min-height:30px;
}
.list-meta span{color:var(--t2)}
.user-list{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 12px 32px;
  display:flex;flex-direction:column;gap:8px;
}
.user-list::-webkit-scrollbar{width:3px}
.user-list::-webkit-scrollbar-track{background:transparent}
.user-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── RIGHT panel ── */
.panel-right{
  flex:1;position:relative;overflow:hidden;background:#07090c;
}
/* blurred bg fills the whole panel */
.pr-blur{
  position:absolute;inset:-10%;
  background-image:var(--img);
  background-size:cover;background-position:50% 25%;
  filter:blur(0px) brightness(.55) saturate(.75);
  transform:scale(1.15);
  image-rendering:auto;
}
/* sharp photo centered, uses full height */
.pr-photo{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.pr-photo img{
  /* fill height, crop sides — keeps photo sharp */
  height:100%;
  width:auto;
  min-width:100%;
  object-fit:cover;
  object-position:38% 22%;
  filter:brightness(.82) contrast(1.06) saturate(.88);
  image-rendering:high-quality;
}
/* gradient fades */
.pr-fade-l{position:absolute;inset:0;background:linear-gradient(to right,var(--bg) 0%,rgba(7,9,12,.3) 28%,transparent 55%)}
.pr-fade-b{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 35%)}
.pr-fade-t{position:absolute;inset:0;background:linear-gradient(to bottom,var(--bg) 0%,transparent 18%)}
/* sun tint */
.pr-sun{position:absolute;inset:0;background:radial-gradient(ellipse 50% 45% at 68% 26%,rgba(240,192,96,.1) 0%,transparent 70%)}
/* hero label bottom-left */
.pr-hero{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 40px 44px;
}
.pr-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.28em;color:var(--t2);text-transform:uppercase;margin-bottom:14px;
}
.eline{width:22px;height:1px;background:var(--ice);opacity:.4}
.pr-h1{font-family:'Unbounded',sans-serif;font-weight:900;line-height:1.0;letter-spacing:-.025em}
.pr-h1 .l1{display:block;font-size:clamp(20px,2.4vw,42px);color:#fff;text-shadow:0 2px 30px rgba(168,212,240,.18)}
.pr-h1 .l2{display:block;font-size:clamp(13px,1.4vw,24px);font-weight:300;color:var(--ice);letter-spacing:.08em;margin-top:4px}

/* ══════════════════════════════
   CARDS
══════════════════════════════ */
.ucard{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:10px;overflow:hidden;
  transition:border-color .18s,background .15s;
  animation:cardIn .25s ease both;
}
.ucard:hover{border-color:var(--b2);background:var(--bg3)}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ucard-mini{display:flex;align-items:center;gap:12px;padding:12px 14px}
.ucard-av{
  width:44px;height:44px;border-radius:50%;
  object-fit:cover;border:1px solid var(--b2);
  flex-shrink:0;background:var(--bg3);display:block;
}
.ucard-info{flex:1;min-width:0}
.ucard-nick{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;margin-bottom:3px}
.ucard-user{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.view-btn{
  flex-shrink:0;padding:6px 13px;
  background:transparent;border:1px solid var(--b2);border-radius:6px;
  color:var(--t2);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:.18s;white-space:nowrap;
}
.view-btn:hover{border-color:var(--ice);color:var(--ice);background:rgba(168,212,240,.05)}

/* empty */
.empty{text-align:center;padding:50px 20px;display:none}
.empty.show{display:block}
.empty-t{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:400;color:var(--t3);margin-bottom:6px}
.empty-d{font-size:12px;color:var(--t3);opacity:.6}

/* ══════════════════════════════
   MODAL
══════════════════════════════ */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid var(--b2);
  border-radius:16px;width:100%;max-width:460px;overflow:hidden;
  transform:translateY(14px) scale(.97);transition:transform .22s;
  box-shadow:0 40px 80px rgba(0,0,0,.7);
}
.overlay.open .modal{transform:translateY(0) scale(1)}
.m-stripe{height:2px;background:linear-gradient(90deg,var(--ice),rgba(168,212,240,.3),transparent)}
.m-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--b1)}
.m-head-title{font-family:'Unbounded',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--t2);text-transform:uppercase;font-weight:400}
.m-close{width:28px;height:28px;background:transparent;border:1px solid var(--b2);color:var(--t3);font-size:14px;border-radius:6px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.m-close:hover{border-color:var(--red);color:var(--red)}
.m-body{padding:22px}
.m-profile{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg3);border:1px solid var(--b1);border-radius:10px;margin-bottom:16px}
.m-av{width:64px;height:64px;border-radius:50%;object-fit:cover;border:1px solid var(--b2);flex-shrink:0}
.m-nick{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.m-user{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t3)}
.m-fields{display:flex;gap:10px;margin-bottom:14px}
.m-field{flex:1;background:var(--bg3);border:1px solid var(--b1);border-radius:8px;padding:11px 14px}
.m-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.m-value{font-size:13px;font-weight:500;color:var(--text);word-break:break-all}
.m-value.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
.m-reason{background:rgba(208,96,96,.07);border:1px solid rgba(208,96,96,.18);border-radius:10px;overflow:hidden}


.m-reason-body{padding:14px 16px;font-size:13px;color:var(--t2);line-height:1.65}

/* ══════════════════════════════
   MOBILE  (≤ 700px)
══════════════════════════════ */
@media(max-width:700px){
  html,body{height:auto;overflow:auto}
  .layout{flex-direction:column;height:auto;min-height:100vh}

  /* photo becomes a tall banner at top */
  .panel-right{
    width:100%;height:56vw;min-height:220px;max-height:320px;
    order:0;flex-shrink:0;
  }
  .pr-photo img{
    object-position:38% 18%;
    width:100%;height:100%;
    object-fit:cover;
  }
  .pr-fade-l{display:none}
  .pr-fade-b{background:linear-gradient(to top,var(--bg) 0%,transparent 45%)}
  .pr-hero{padding:0 20px 28px}
  .pr-h1 .l1{font-size:clamp(22px,6vw,36px)}
  .pr-h1 .l2{font-size:clamp(14px,4vw,22px)}

  /* list takes remaining space */
  .panel-left{
    width:100%;order:1;
    border-right:none;border-top:1px solid var(--b1);
    overflow:visible;
  }
  .user-list{overflow:visible;padding-bottom:40px}
  .search-wrap{padding:14px 14px 0}
  .user-list{padding:0 10px 32px}
  .left-header{padding:0 16px}
}

@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

let allEntries=[];

async function init(){showLoader();await fetchData()}

async function fetchData(){
  try{
    const r=await fetch(GITHUB_RAW_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    let entries=[];
    if(Array.isArray(data)){entries=data}
    else{
      entries=[
        ...(data.server||[]).map(e=>({...e,discord_id:e.discord_id||e.id})),
        ...(data.staff ||[]).map(e=>({...e,discord_id:e.discord_id||e.id}))
      ];
    }
    allEntries=entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
    document.getElementById('hcount').textContent=allEntries.length+' '+plural(allEntries.length);
    removeLoader();renderList();
  }catch(e){console.error(e);removeLoader();showError()}
}

function showLoader(){
  const ul=document.getElementById('userList');
  const d=document.createElement('div');
  d.id='loader';
  d.style.cssText='display:flex;justify-content:center;padding:50px';
  d.innerHTML='<div style="width:20px;height:20px;border:1.5px solid #1e2a38;border-top-color:#a8d4f0;border-radius:50%;animation:spin .8s linear infinite"></div>';
  ul.prepend(d);
}
function removeLoader(){const l=document.getElementById('loader');if(l)l.remove()}
function showError(){
  const ul=document.getElementById('userList');
  const d=document.createElement('div');
  d.style.cssText='text-align:center;padding:50px 20px';
  d.innerHTML=`<div style="font-family:'Unbounded',sans-serif;font-size:13px;color:#4a6070;margin-bottom:12px">Не удалось загрузить</div>
    <button onclick="location.reload()" style="padding:8px 18px;background:rgba(168,212,240,.07);border:1px solid rgba(168,212,240,.2);color:#8fa3b8;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:8px">Повторить</button>`;
  ul.appendChild(d);
}

function renderList(query=''){
  const filtered=query
    ?allEntries.filter(e=>{
        const id=(e.discord_id||e.id||'').toLowerCase();
        return id.includes(query)||(e.nick||'').toLowerCase().includes(query)
          ||(e.username||'').toLowerCase().includes(query)
          ||(e.tags||'').toLowerCase().includes(query)
          ||(e.reason||'').toLowerCase().includes(query);
      })
    :allEntries;
  const ul=document.getElementById('userList');
  const empty=document.getElementById('emptyState');
  ul.querySelectorAll('.ucard').forEach(c=>c.remove());
  const meta=document.getElementById('listMeta');
  if(filtered.length===0){
    empty.classList.add('show');
    empty.querySelector('.empty-t').textContent=query?'Ничего не найдено':'Список пуст';
    empty.querySelector('.empty-d').textContent=query?'Попробуй изменить запрос':'Записи появятся после добавления через Discord бота';
    meta.innerHTML='';return;
  }
  empty.classList.remove('show');
  meta.innerHTML=query
    ?`По запросу <span>"${esc(query)}"</span> — <span>${filtered.length}</span> ${plural(filtered.length)}`
    :`<span>${filtered.length}</span> ${plural(filtered.length)}`;
  filtered.forEach((e,i)=>ul.appendChild(createCard(e,i)));
}

function createCard(e,idx){
  const div=document.createElement('div');
  div.className='ucard';
  div.style.animationDelay=Math.min(idx*.04,.5)+'s';
  const id=e.discord_id||e.id||'—';
  const av=e.avatar||NOAVATAR;
  div.innerHTML=`
    <div class="ucard-mini">
      <img class="ucard-av" src="${av}" alt="" onerror="this.src='${NOAVATAR}'">
      <div class="ucard-info">
        <div class="ucard-nick">${esc(e.nick||'—')}</div>
        <div class="ucard-user">@${esc(e.username||'—')}</div>
      </div>
      <button class="view-btn" onclick="openModal('${esc(id)}')">Посмотреть</button>
    </div>`;
  return div;
}

function openModal(discordId){
  const e=allEntries.find(x=>(x.discord_id||x.id)===discordId);
  if(!e)return;
  const dateStr=e.date?new Date(e.date).toLocaleString('ru-RU'):'—';
  const av=e.avatar||NOAVATAR;
  const id=e.discord_id||e.id||'—';
  document.getElementById('mBody').innerHTML=`
    <div class="m-profile">
      <img class="m-av" src="${av}" alt="" onerror="this.src='${NOAVATAR}'">
      <div><div class="m-nick">${esc(e.nick||'—')}</div><div class="m-user">@${esc(e.username||'—')}</div></div>
    </div>
    <div class="m-fields">
      <div class="m-field"><div class="m-label">Discord ID</div><div class="m-value mono">${esc(id)}</div></div>
      <div class="m-field"><div class="m-label">Дата</div><div class="m-value mono" style="font-size:10px">${dateStr}</div></div>
    </div>
    ${e.reason&&e.reason!=='-'?`<div class="m-reason">
      <div class="m-reason-body">${esc(e.reason)}</div>
    </div>`:''}`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(ev){if(ev.target===document.getElementById('modalOverlay'))closeModalDirect()}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow=''}
function onSearch(){renderList(document.getElementById('searchInp').value.trim().toLowerCase())}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function plural(n){const v=Math.abs(n)%100,v1=v%10;if(v>10&&v<20)return 'записей';if(v1===1)return 'запись';if(v1>=2&&v1<=4)return 'записи';return 'записей'}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect()});
init();
</script>
